[tool:pytest]
minversion = 7.0
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    -ra
    --showlocals
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    -W ignore::DeprecationWarning
    -W ignore::pytest.PytestUnraisableExceptionWarning
    -W ignore:coroutine 'Connection._cancel' was never awaited:RuntimeWarning
    -W ignore:Setting per-request cookies is being deprecated:DeprecationWarning
    --tb=short
    --timeout=30
    # Optimize for CI performance
    --maxfail=5  # Stop after 5 failures

markers =
    slow: marks tests as slow (>1 second)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests (may be slow)
    requires_redis: marks tests that require Redis

[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
parallel = true  # Enable parallel coverage collection

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
