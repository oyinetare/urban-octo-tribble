# Note: 'version' line is omitted as it is obsolete in the Compose Specification
name: urban-octo-tribble-stack

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: urban-octo-tribble-postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: urban-octo-tribble
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis for token-blacklisting, caching, rate limiting, session storage
  redis:
    image: redis:7-alpine
    container_name: urban-octo-tribble-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    container_name: urban-octo-tribble-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # Qdrant (Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: urban-octo-tribble-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  # Redpanda (Kafka-compatible Event Streaming)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: urban-octo-tribble-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "18081:18081"  # Schema Registry (external)
      - "18082:18082"  # Pandaproxy (external)
      - "19092:19092"  # Kafka API (external)
      - "19644:9644"   # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - app_network

  # Redpanda Console (Web UI for debugging)
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: urban-octo-tribble-redpanda-console
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: "http://redpanda:9644"
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - app_network

  # Celery Worker (Background Tasks)
  celery-worker:
    build: .
    container_name: urban-octo-tribble-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/urban-octo-tribble
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_WORKER: "true"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: documents
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Event Streaming
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence-transformers
      XDG_CACHE_HOME: /app/.cache
    volumes:
      - ./app:/app/app
      - model_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app_network

  # ========================================
  # API REPLICAS (3 instances for horizontal scaling)
  # ========================================

  api-1:
    build:
      context: .
      target: final
    container_name: urban-octo-tribble-api-1
    restart: always
    hostname: api-1
    environment:
      # Instance identifier for logging
      INSTANCE_ID: "api-1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urban-octo-tribble
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      # Event Streaming
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence-transformers
      XDG_CACHE_HOME: /app/.cache
    volumes:
      - model_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  api-2:
    build:
      context: .
      target: final
    container_name: urban-octo-tribble-api-2
    restart: always
    hostname: api-2
    environment:
      INSTANCE_ID: "api-2"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urban-octo-tribble
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence-transformers
      XDG_CACHE_HOME: /app/.cache
    volumes:
      - model_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  api-3:
    build:
      context: .
      target: final
    container_name: urban-octo-tribble-api-3
    restart: always
    hostname: api-3
    environment:
      INSTANCE_ID: "api-3"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urban-octo-tribble
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence-transformers
      XDG_CACHE_HOME: /app/.cache
    volumes:
      - model_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ========================================
  # NGINX LOAD BALANCER
  # ========================================

  nginx:
    image: nginx:alpine
    container_name: urban-octo-tribble-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
      api-3:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  redpanda_data:
  model_cache:
  nginx_logs:

networks:
  app_network:
    driver: bridge
