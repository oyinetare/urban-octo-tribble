# Note: 'version' line is omitted as it is obsolete in the Compose Specification
name: urban-octo-tribble-stack

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: urban-octo-tribble-postgres
    restart: always
    shm_size: 128mb  # Recommended for Postgres performance
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: urban-octo-tribble
    # ports: # Do NOT expose in production unless needed for external debugging
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis for token-blacklisting, caching, rate limiting..
  redis:
    image: redis:7-alpine
    container_name: urban-octo-tribble-redis
    restart: always
    # Always set a password for Redis 7+ in production environments
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
    # -a provides the password to redis-cli for authentication
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    container_name: urban-octo-tribble-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # ports: # Do NOT expose in production unless needed for external debugging
    #   - "9000:9000"  # API
    #   - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # Qdrant (Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: urban-octo-tribble-qdrant
    # ports:
      # - "6333:6333"
      # - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  # Celery Worker (Background Tasks)
  celery-worker:
    build: .
    container_name: urban-octo-tribble-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/urban-octo-tribble
      # Redis & Celery w all three variables pointing to redis container
      # celery-worker service update
      # Note the colon before the password for "password-only" auth
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: documents
      # LLM
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Phase 4: Event streaming
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      # redpanda:
      #   condition: service_healthy
    networks:
      - app_network

  api:
    build:
      context: .
      target: final # If using the multi-stage builder we discussed
    container_name: urban-octo-tribble-api
    restart: always
    environment:
      # Use internal service names (postgres, redis) for communication
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urban-octo-tribble
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:

networks:
  app_network:
    driver: bridge
