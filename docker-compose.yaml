services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: urban-octo-tribble-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urban-octo-tribble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urban-octo-tribble-network

  # Redis (for token blacklisting and caching)
  redis:
    image: redis:7-alpine
    container_name: urban-octo-tribble-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urban-octo-tribble-network

  # MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    container_name: urban-octo-tribble-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - urban-octo-tribble-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  urban-octo-tribble-network:
    driver: bridge
