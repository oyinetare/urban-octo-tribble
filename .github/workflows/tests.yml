name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Launch real infrastructure for integration testing
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]

      minio:
        # Using a specific version tag to avoid 'latest' manifest issues
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: documents
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
        PROJECT_NAME: "urban-octo-tribble"
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        SECRET_KEY: "ci-test-secret-key-not-for-production"

        # Redis & Celery (Pointing to the service above)
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
        CELERY_BROKER_URL: "redis://localhost:6379/0"
        CELERY_RESULT_BACKEND: "redis://localhost:6379/0"

        # MinIO
        MINIO_ENDPOINT: localhost:9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin

        # Qdrant
        QDRANT_HOST: localhost
        QDRANT_PORT: 6333
        QDRANT_COLLECTION_NAME: "documents"

        # Embedding & Search
        EMBEDDING_MODEL: "all-MiniLM-L6-v2"
        EMBEDDING_DIMENSION: 384
        EMBEDDING_BATCH_SIZE: 32
        DEFAULT_SEARCH_LIMIT: 5
        DEFAULT_SCORE_THRESHOLD: 0.7

        UV_CACHE_DIR: /home/runner/work/_temp/setup-uv-cache

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run Ruff Linting
      run: uv run ruff check .

    - name: Run tests with coverage
      timeout-minutes: 10
      run: |
        uv run pytest -n auto \
          --cov=app \
          --cov-report=xml \
          --cov-report=term-missing:skip-covered \
          --cov-fail-under=75 \
          -m "not slow" # Skip slow tests in CI by default

    # Optional: Run slow tests separately with longer timeout
    # - name: Run slow/performance tests
    #   timeout-minutes: 3
    #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    #   run: |
    #     uv run --no-sync pytest -n auto \
    #       -m "slow or performance" \
    #       --durations=10
