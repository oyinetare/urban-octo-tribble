name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # Updated to v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5 # Using latest 2026 stable version
      with:
        enable-cache: true # Automatically caches uv's environment
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13 # Matches your pyproject.toml requirement

    - name: Install dependencies
      # --group dev installs your dependency-groups.dev from pyproject.toml
      run: uv sync --group dev

    - name: Run tests with coverage
      # uv run ensures the command runs within the synced virtual environment
      run: |
        uv run pytest --cov=app --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5 # Updated to v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false # Prevent CI failure if Codecov is down
        token: ${{ secrets.CODECOV_TOKEN }} # Recommended for 2026 security

    - name: Check coverage threshold
      # Using --no-cov avoids re-running the logic, just checks the data
      run: |
        uv run pytest --cov=app --cov-fail-under=80
