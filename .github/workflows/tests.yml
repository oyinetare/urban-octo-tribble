name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
        PROJECT_NAME: "urban-octo-tribble"
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        SECRET_KEY: "ci-test-secret-key-not-for-production"
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: "changeme"
        MINIO_ENDPOINT: localhost:9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
        CELERY_BROKER_URL: "redis://:changeme@redis:6379/0"
        CELERY_RESULT_BACKEND: "redis://:changeme@redis:6379/0"
        CELERY_TASK_SERIALIZER: "json"
        CELERY_RESULT_SERIALIZER: "json"
        CELERY_ACCEPT_CONTENT: '[ "json" ]'
        CELERY_TIMEZONE: "UTC"
        CELERY_ENABLE_UTC: "True"
        UV_CACHE_DIR: /home/runner/work/_temp/setup-uv-cache

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run tests with coverage (single run)
      timeout-minutes: 5
      run: |
        uv run --no-sync pytest -n auto \
          --cov=app \
          --cov-report=xml \
          --cov-report=term-missing:skip-covered \
          --cov-fail-under=75 \
          --durations=10 \
          -m "not slow"  # Skip slow tests in CI by default

    # Optional: Run slow tests separately with longer timeout
    - name: Run slow/performance tests
      timeout-minutes: 3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        uv run --no-sync pytest -n auto \
          -m "slow or performance" \
          --durations=10
