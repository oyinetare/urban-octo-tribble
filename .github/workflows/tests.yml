name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env: # Ensure env vars are present here too
      # Use dummy values to satisfy Pydantic validation
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      # --group dev installs your dependency-groups.dev from pyproject.toml
      run: uv sync --group dev

    - name: Run tests with coverage
      timeout-minutes: 2
      # uv run ensures the command runs within the synced virtual environment
      run: |
        uv run pytest --cov=app --cov-report=xml --cov-report=term

    # - name: Upload coverage to Codecov
    #   uses: codecov/codecov-action@v5
    #   with:
    #     files: ./coverage.xml
    #     fail_ci_if_error: false # Prevent CI failure if Codecov is down
    #     token: ${{ secrets.CODECOV_TOKEN }}

    - name: Check coverage threshold
      run: |
        uv run pytest --cov=app --cov-fail-under=70
